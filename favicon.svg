<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#020818"/>

  <!-- Sphere outline -->
  <circle cx="16" cy="16" r="11.5" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="1.2" opacity="0.85"/>

  <!-- Equatorial ellipse -->
  <ellipse cx="16" cy="16" rx="11.5" ry="4.2" fill="none" stroke="#00e5ff" stroke-width="0.9" opacity="0.45"/>

  <!-- Vertical meridian (partial circle approximation) -->
  <ellipse cx="16" cy="16" rx="4.2" ry="11.5" fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.25"/>

  <!-- Z axis: bottom to top with arrow -->
  <line x1="16" y1="27" x2="16" y2="4.5" stroke="#00e5ff" stroke-width="1.1" opacity="0.7"/>
  <polygon points="16,3 14.2,6.5 17.8,6.5" fill="#00e5ff" opacity="0.8"/>

  <!-- X axis stub (lower-right) -->
  <line x1="16" y1="16" x2="26" y2="20" stroke="#a855f7" stroke-width="0.9" opacity="0.6"/>

  <!-- State vector |ψ⟩ — glowing arrow from center to upper-right -->
  <line x1="16" y1="16" x2="24.5" y2="7.5" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="24.5,7.5 20.8,8.8 23.2,12.1" fill="#00e5ff"/>

  <!-- Glowing dot at tip -->
  <circle cx="24.5" cy="7.5" r="2.2" fill="#00e5ff" opacity="0.95"/>
  <circle cx="24.5" cy="7.5" r="3.5" fill="#00e5ff" opacity="0.18"/>
</svg>
